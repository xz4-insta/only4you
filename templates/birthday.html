<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday 🎂</title>

<script src="https://cdn.jsdelivr.net/npm/fireworks-js@2/dist/index.umd.js"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
body {
  margin: 0;
  overflow: hidden;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  /* Cream Background */
  background: #fffcf2;
  font-family: 'Georgia', serif;
  color: #444;
}

/* Base Stage */
.stage {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100vh;
  z-index: 1000;
  padding: 20px;
  box-sizing: border-box;
  justify-content: center;
  align-items: center;
  text-align: center;
  flex-direction: column;
}

.stage.active {
  display: flex;
}

/* Card with Soft Glow */
.card {
  background: #ffffff;
  border-radius: 30px;
  padding: 50px 30px;
  width: 450px;
  max-width: 95%;
  text-align: center;
  color: #444;
  position: relative;
  box-shadow: 0 15px 40px rgba(255, 107, 129, 0.1);
  animation: fadeIn 1s ease-out forwards;
  border: 1px solid #ffde5944;
  overflow: visible;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

h2, h1 {
  font-size: 38px;
  margin-top: 0;
  margin-bottom: 10px;
  color: #333;
}

h2 b, h1 b {
  font-weight: bold;
  color: #ff6b81;
}

/* ===== BUTTON ===== */
button {
  padding: 14px 35px;
  border: none;
  border-radius: 40px;
  margin-top: 25px;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
  background: linear-gradient(135deg, #ff6b81, #ff9a9e);
  color: #fff;
  box-shadow: 0 10px 20px rgba(255, 107, 129, 0.3);
  transition: .3s ease;
  letter-spacing: 1px;
}

button:hover {
  transform: translateY(-3px);
  box-shadow: 0 15px 30px rgba(255, 107, 129, 0.4);
  background: linear-gradient(135deg, #ff7b91, #ffabb0);
}

/* ===== ENVELOPE ===== */
.envelope {
  width: 260px;
  height: 180px;
  background: linear-gradient(135deg, #ff9a9e, #fad0c4);
  margin: 30px auto;
  position: relative;
  border-radius: 12px;
  box-shadow: 0 15px 35px rgba(255, 154, 158, 0.3);
  cursor: pointer;
  overflow: hidden;
  transition: transform .4s ease;
  border: 1px solid white;
}

.envelope:hover {
  transform: scale(1.03);
}

.flap {
  position: absolute;
  width: 100%;
  height: 100%;
  background: linear-gradient(135deg, #fad0c4, #ff9a9e);
  clip-path: polygon(0 0, 100% 0, 50% 60%);
  transition: .8s ease;
  transform-origin: top;
  z-index: 2;
}

.letter {
  position: absolute;
  bottom: -100%;
  left: 0;
  background: #fff;
  color: #ff6b81;
  width: 100%;
  height: 100%;
  padding: 20px;
  box-sizing: border-box;
  transition: .8s ease;
  font-size: 18px;
  line-height: 1.6;
  border-radius: 10px;
  z-index: 1;
  font-weight: normal;
  border: 1px solid #f0f0f0;
}

/* ===== METER ===== */
.loveLevelTag {
  display: inline-block;
  background: rgba(255, 107, 129, 0.1);
  color: #ff6b81;
  font-weight: bold;
  padding: 8px 18px;
  border-radius: 30px;
  font-size: 14px;
  margin: 10px 0;
  text-transform: uppercase;
}

.lovePulse {
  animation: pulseLove .3s ease;
}

@keyframes pulseLove {
  0% { transform: scale(1); }
  50% { transform: scale(1.1); }
  100% { transform: scale(1); }
}

.loveBar {
  width: 300px;
  height: 18px;
  background: #f0f0f0;
  border-radius: 20px;
  margin: 20px auto;
  position: relative;
  overflow: hidden;
  border: 1px solid #eee;
}

#loveFill {
  height: 100%;
  width: 0%;
  min-width: 10px;
  background: linear-gradient(90deg, #ff9a9e, #ff6b81);
  border-radius: 20px;
  transition: width .4s ease;
}

.loveBig {
  font-size: 60px;
  font-weight: bold;
  margin-top: 10px;
  color: #ff6b81;
  transition: all .3s ease;
}

.loveSub {
  opacity: 0.7;
  margin-bottom: 20px;
  font-size: 16px;
}

/* Button Shake */
.shake {
  animation: shake .3s;
}

@keyframes shake {
  0%{transform:translateX(0)}
  25%{transform:translateX(-5px)}
  50%{transform:translateX(5px)}
  75%{transform:translateX(-5px)}
  100%{transform:translateX(0)}
}

/* Floating Elements */
.floatHeart {
  position: absolute;
  font-size: 25px;
  pointer-events: none;
  animation: heartFloat 1.5s forwards;
  color: #ff6b81;
}

@keyframes heartFloat {
  0% { opacity: 1; transform: translateY(0) scale(1); }
  100% { opacity: 0; transform: translateY(-130px) scale(1.5); }
}

#tvScreen img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  border-radius: 15px;
}

/* Progress Dots */
.progress-dots {
  position: fixed;
  bottom: 25px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 12px;
}

.dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: rgba(255, 107, 129, 0.2);
  transition: .3s ease;
}

.dot.active {
  background: #ff6b81;
  box-shadow: 0 0 10px rgba(255, 107, 129, 0.4);
}

.voice-container {
  display: flex;
  flex-direction: column;
  gap: 15px;
  margin-top: 25px;
  width: 80%;
  margin-inline: auto;
}

.voiceBtn {
  padding: 15px 25px;
  border-radius: 30px;
  border: 1px solid #ffdae0;
  background: #fff;
  color: #ff6b81;
  font-weight: bold;
  cursor: pointer;
  font-size: 15px;
  transition: .3s;
}

.voiceBtn:hover {
  background: #fff0f3;
}

/* YES Button */
.yes {
  background: linear-gradient(135deg, #ff6b81, #ff9a9e);
  color: white;
  animation: pulseBtn 1s infinite alternate;
  font-weight: bold;
}

@keyframes pulseBtn {
  0%{transform: scale(1);}
  100%{transform: scale(1.05);}
}

.no {
  background: #fff !important;
  color: #ccc !important;
  border: 1px solid #eee !important;
}

.ring {
  font-size: 80px;
  opacity: 0;
  transition: .6s;
  margin: 20px 0;
}

.ring.show {
  opacity: 1;
  transform: scale(1.2);
}

</style>
</head>

<body>

<!-- STAGE 1 -->
<div class="stage active" id="stage1">
  <div class="card" style="padding-top:60px;">
    <h1>Happy <br><b>Birthday</b> 🎂</h1>
    <div class="envelope" onclick="openLetter()">
      <div class="flap"></div>
      <div class="letter" id="letterContent">{{message}}</div>
    </div>
    <button onclick="nextStage()">Unwrap It! 🎁</button>
  </div>
</div>

<!-- STAGE 2 -->
<div class="stage" id="stage2">
  <div class="card">
    
    <h2>Are You <br><b>Ready?!</b></h2>
    <p style="opacity:.8; font-size:16px; margin-bottom:30px;">Tap fast to build hype! 🎈</p>
    <div class="loveLevelTag" id="loveLevelTag">GETTING READY 🎈</div>
    <div class="loveBar">
      <div id="loveFill"></div>
    </div>
    <div class="loveBig" id="loveBig">0%</div>
    <p class="loveSub" id="loveSub">...</p>
    <button class="loveBtn" onclick="increaseLove()" style="font-size:20px;">🎊 Tap Here</button>
    <button id="continueBtn" onclick="nextStage()" style="display:none">Let's Go! →</button>
  </div>
</div>

<!-- STAGE 3 MEMORIES -->
<div class="stage" id="stage3">
  <div class="card">
    
    <h2>Fun <br><b>Memories</b> 📸</h2>
    <div id="tvScreen" style="width:100%; height:350px; overflow:hidden; border-radius:15px; background:#f0f0f0; margin-top:20px; border:3px solid #eee;"></div>
    <div style="margin-top:25px; display:flex; gap:15px; justify-content:center;">
      <button onclick="prevMemory()" style="background:#ffdfba;">⬅</button>
      <button onclick="nextMemory()" style="background:#ffdfba;">➡</button>
    </div>
    <button onclick="nextStage()" style="width:100%; margin-top:15px;">Next Surprise ✨</button>
  </div>
</div>

<!-- STAGE 4 VOICE MEMORIES -->
<div class="stage" id="stage4">
  <div class="card">
    
    <h2>Birthday <br><b>Wishes</b> 🎧</h2>
    <p style="opacity:.8; font-size:14px;">Listen to the party messages!</p>
    <div id="voiceContainer" class="voice-container"></div>
    <div id="reactionTarget" style="margin:20px 0;"></div>
    <button onclick="nextStage()" style="width:100%;">Continue</button>
  </div>
</div>

<!-- STAGE 5 QUIZ -->
<div class="stage" id="stage5">
  <div class="card">
    
    <h2>The Birthday <br><b>Game</b> 🎈</h2>
    <p style="opacity:.8; font-size:14px; margin-bottom:20px;">How well do you know the star? 🥂</p>
    <div id="quizContainer"></div>
    <button onclick="nextStage()" style="width:100%; margin-top:20px;">Grand Finale ➡</button>
  </div>
</div>

<!-- STAGE 6 FINAL -->
<div class="stage" id="stage6">
  <div class="card" style="padding:60px 40px;">
    <h2 id="finalQuestion" style="font-weight:normal;"></h2>
    <div class="ring" id="ring">🎁🎊</div>
    <div style="display:flex; gap:15px; justify-content:center; margin-top:30px;">
      <button class="yes" id="yesBtn" onclick="celebrate()">YES! 💖</button>
      <button class="no" id="noBtn">Umm... 😅</button>
    </div>
  </div>
</div>

<div class="progress-dots" id="progressDots"></div>

<script type="module">
import { initEpicInteractions } from "../js/stageEngine.js";

document.addEventListener("DOMContentLoaded",()=>{
  // Skip if we are being loaded by success.html (which handles its own init)
  if (window.location.pathname.includes("success.html")) return;

  const saved = JSON.parse(localStorage.getItem("only4you_story")) || {};

  initEpicInteractions({
    message: saved.message || "Happy Birthday! You deserve the world 🎂🎁",
    images: saved.images || [],
    voices: saved.voices || [],
    quiz: saved.quiz || [],
    finalQuestion: saved.finalQuestion || "Did you love your surprise? 🎁"
  });
});
</script>

</body>
</html>
