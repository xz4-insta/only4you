<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Only For You 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/fireworks-js@2/dist/index.umd.js"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
body {
  margin: 0;
  overflow: hidden;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #1a0505, #3a000d, #1a0505);
  background-size: 200% 200%;
  animation: gradientMove 8s ease infinite;
  font-family: 'Poppins', sans-serif;
  color: #fff;
}

@keyframes gradientMove {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* ===== STAGE BASE ===== */
.stage {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100vh;
  z-index: 1000;
  padding: 20px;
  box-sizing: border-box;
  justify-content: center;
  align-items: center;
  text-align: center;
  flex-direction: column;
}

.stage.active {
  display: flex;
}

/* Card */
.card {
  background: rgba(30,0,10,0.8);
  backdrop-filter: blur(20px);
  border-radius: 40px;
  padding: 50px 30px;
  width: 450px;
  max-width: 90%;
  text-align: center;
  color: white;
  position: relative;
  box-shadow:
    0 0 40px rgba(220,20,60,0.5),
    0 0 80px rgba(139,0,0,0.4);
  animation: fadeIn 1.5s ease forwards, glowPulse 3s infinite alternate;
  transform-style: preserve-3d;
  transition: transform 0.2s ease;
  border: 1px solid rgba(255,255,255,0.05);
}

@keyframes glowPulse {
  from { box-shadow: 0 0 40px rgba(220,20,60,0.5), 0 0 80px rgba(139,0,0,0.4); }
  to { box-shadow: 0 0 60px rgba(220,20,60,0.8), 0 0 100px rgba(255,0,0,0.5); }
}

@keyframes fadeIn {
  from { opacity: 0; transform: scale(0.8); }
  to { opacity: 1; transform: scale(1); }
}

h2, h1 {
  font-family: 'Great Vibes', cursive;
  font-size: 50px;
  margin-top: 0;
  margin-bottom: 10px;
  text-shadow: 0 2px 5px rgba(0,0,0,0.2);
}

/* ===== BUTTON ===== */
button {
  padding: 12px 30px;
  border: none;
  border-radius: 30px;
  margin-top: 20px;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  background: linear-gradient(90deg, #8b0000, #dc143c);
  color: white;
  box-shadow: 0 10px 20px rgba(220, 20, 60, 0.4);
  transition: .3s ease;
  font-family: 'Poppins', sans-serif;
}

button:hover {
  transform: translateY(-3px);
  box-shadow: 0 15px 30px rgba(220, 20, 60, 0.6);
}

/* ===== ENVELOPE ===== */
.envelope {
  width: 260px;
  height: 180px;
  background: linear-gradient(135deg, #8b0000, #dc143c);
  margin: 30px auto;
  position: relative;
  border-radius: 14px;
  box-shadow: 0 15px 40px rgba(220, 20, 60, 0.4);
  cursor: pointer;
  overflow: hidden;
  transition: transform .3s ease;
}

.envelope:hover {
  transform: scale(1.05);
}

.flap {
  position: absolute;
  width: 100%;
  height: 100%;
  background: linear-gradient(135deg, #dc143c, #8b0000);
  clip-path: polygon(0 0, 100% 0, 50% 60%);
  transition: .8s ease;
  transform-origin: top;
  z-index: 2;
}

.letter {
  position: absolute;
  bottom: -100%;
  left: 0;
  background: rgba(255,255,255,0.9);
  color: #8b0000;
  width: 100%;
  height: 100%;
  padding: 20px;
  box-sizing: border-box;
  transition: .8s ease;
  font-size: 16px;
  line-height: 1.5;
  border-radius: 10px;
  font-weight: 600;
  z-index: 1;
}

/* ===== LOVE METER ===== */
.loveLevelTag {
  display: inline-block;
  background: rgba(255,255,255,0.3);
  padding: 8px 18px;
  border-radius: 30px;
  font-size: 14px;
  font-weight: 600;
  margin: 10px 0;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

.lovePulse {
  animation: pulseLove .3s ease;
}

@keyframes pulseLove {
  0% { transform: scale(1); }
  50% { transform: scale(1.2); }
  100% { transform: scale(1); }
}

.loveBar {
  width: 300px;
  height: 20px;
  background: rgba(255,255,255,0.3);
  border-radius: 20px;
  margin: 20px auto;
  position: relative;
  overflow: hidden;
  box-shadow: inset 0 3px 5px rgba(0,0,0,0.1);
}

#loveFill {
  height: 100%;
  width: 0%;
  min-width: 10px;
  background: linear-gradient(90deg, #8b0000, #dc143c);
  border-radius: 20px;
  transition: width .35s ease;
  box-shadow: 0 0 10px rgba(220, 20, 60, 0.8);
}

.loveBig {
  font-family: 'Great Vibes', cursive;
  font-size: 70px;
  margin-top: 10px;
  color: #fff;
  text-shadow: 0 0 15px rgba(220, 20, 60, 0.8);
  transition: all .3s ease;
  line-height: 1;
}

.loveSub {
  opacity: 0.9;
  margin-bottom: 20px;
  font-size: 16px;
}

/* Button Shake */
.shake {
  animation: shake .3s;
}

@keyframes shake {
  0%{transform:translateX(0)}
  25%{transform:translateX(-5px)}
  50%{transform:translateX(5px)}
  75%{transform:translateX(-5px)}
  100%{transform:translateX(0)}
}

/* Floating Hearts */
.floatHeart {
  position: absolute;
  font-size: 24px;
  pointer-events: none;
  animation: heartFloat 1s forwards;
}

@keyframes heartFloat {
  0% { opacity: 1; transform: translateY(0) scale(1); }
  100% { opacity: 0; transform: translateY(-100px) scale(2); }
}

#tvScreen img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  border-radius: 20px;
}

/* Progress Dots */
.progress-dots {
  position: fixed;
  bottom: 25px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 12px;
}

.dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: rgba(255,255,255,0.4);
  transition: .3s ease;
}

.dot.active {
  background: #fff;
  transform: scale(1.5);
  box-shadow: 0 0 10px #fff;
}

.voice-container {
  display: flex;
  flex-direction: column;
  gap: 15px;
  margin-top: 25px;
  width: 80%;
  margin-inline: auto;
}

.voiceBtn {
  padding: 15px 25px;
  border-radius: 30px;
  border: none;
  background: rgba(255,255,255,0.3);
  color: white;
  cursor: pointer;
  font-size: 16px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

/* YES Button */
.yes {
  background: white;
  color: #dc143c;
  animation: glowPulseBtn 2s infinite;
  font-weight: bold;
}

@keyframes glowPulseBtn {
  0%{box-shadow:0 0 20px rgba(255,255,255,.6);}
  50%{box-shadow:0 0 40px rgba(255,255,255,1);}
  100%{box-shadow:0 0 20px rgba(255,255,255,.6);}
}

.no {
  background: rgba(255,255,255,0.2) !important;
  color: white;
}

.ring {
  font-size: 80px;
  opacity: 0;
  transition: .6s;
  margin: 20px 0;
}

.ring.show {
  opacity: 1;
  transform: scale(1.3);
  animation: floatRing 3s ease-in-out infinite;
}

@keyframes floatRing {
  0%, 100% { transform: translateY(0) scale(1.3); }
  50% { transform: translateY(-10px) scale(1.3); }
}

/* Shimmer Effect */
@keyframes shimmer{
  0%{ left:-100%; }
  100%{ left:150%; }
}

.shimmer-effect {
  position: absolute;
  top: 0;
  left: -100%;
  width: 50%;
  height: 100%;
  background: linear-gradient(120deg, transparent, rgba(255,255,255,0.4), transparent);
  animation: shimmer 4s infinite;
  pointer-events: none;
  z-index: 10;
}
</style>
</head>

<body>

<!-- STAGE 1 -->
<div class="stage active" id="stage1">
  <div class="card">
    <div class="shimmer-effect"></div>
    <h2 style="font-size:45px">Only for you 💖</h2>
    <div class="envelope" onclick="openLetter()">
      <div class="flap"></div>
      <div class="letter" id="letterContent">{{message}}</div>
    </div>
    <button onclick="nextStage()">Begin Journey</button>
  </div>
</div>

<!-- STAGE 2 -->
<div class="stage" id="stage2">
  <div class="card">
    <div class="shimmer-effect"></div>
    <h2>Do You Love Me? 💕</h2>
    <p style="opacity:.9; font-size:14px;">Tap repeatedly to fill the love meter!</p>
    <div class="loveLevelTag" id="loveLevelTag">WARMING UP 💗</div>
    <div class="loveBar">
      <div id="loveFill"></div>
    </div>
    <div class="loveBig" id="loveBig">0%</div>
    <p class="loveSub" id="loveSub">It's starting...</p>
    <button class="loveBtn" onclick="increaseLove()">💖 Tap for Love</button>
    <button id="continueBtn" onclick="nextStage()" style="display:none">Continue →</button>
  </div>
</div>

<!-- STAGE 3 MEMORIES -->
<div class="stage" id="stage3">
  <div class="card">
    <div class="shimmer-effect"></div>
    <h2>Our Memories 📸</h2>
    <div id="tvScreen" style="width:100%; height:220px; overflow:hidden; border-radius:20px; box-shadow:0 10px 30px rgba(0,0,0,.2); margin-top:20px; background:rgba(255,255,255,0.1);"></div>
    <div style="margin-top:20px; display:flex; gap:10px; justify-content:center;">
      <button onclick="prevMemory()" style="background:rgba(255,255,255,0.2);">⬅ Previous</button>
      <button onclick="nextMemory()" style="background:rgba(255,255,255,0.2);">Next ➡</button>
    </div>
    <button onclick="nextStage()" style="width:100%;">Continue 💖</button>
  </div>
</div>

<!-- STAGE 4 VOICE MEMORIES -->
<div class="stage" id="stage4">
  <div class="card">
    <div class="shimmer-effect"></div>
    <h2>Hear My Heart 🎧</h2>
    <p style="opacity:.9; font-size:14px;">Tap to listen to special voice messages</p>
    <div id="voiceContainer" class="voice-container"></div>
    <button onclick="nextStage()" style="width:100%;">Continue 💖</button>
  </div>
</div>

<!-- STAGE 6 FINAL -->
<div class="stage" id="stage6">
  <div class="card">
    <div class="shimmer-effect"></div>
    <h2 id="finalQuestion" style="font-size:60px; line-height:1.2;"></h2>
    <img src="assets/bouquet.jpg" class="ring" id="ring" alt="Bouquet" style="width:220px; border-radius:20px; box-shadow:0 15px 40px rgba(0,0,0,0.5); object-fit:cover;">
    <div style="display:flex; gap:15px; justify-content:center;">
      <button class="yes" id="yesBtn" onclick="celebrate()">YES 💖</button>
      <button class="no" id="noBtn">NO 😅</button>
    </div>
  </div>
</div>

<div class="progress-dots" id="progressDots"></div>

<script type="module">
import { initEpicInteractions } from "../js/stageEngine.js";

document.addEventListener("DOMContentLoaded",()=>{
  const saved = JSON.parse(localStorage.getItem("only4you_story")) || {};
  if (window.location.search.includes("preview")) return;

  initEpicInteractions({
    message:"You changed my life ❤️",
    images: saved.images || [],
    voices: saved.voices || [],
    finalQuestion:"Will you be my valentine? 💖"
  });
});
</script>

</body>
</html>
