<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Anniversary 🥂</title>

<script src="https://cdn.jsdelivr.net/npm/fireworks-js@2/dist/index.umd.js"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
body {
  margin: 0;
  overflow: hidden;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #fdfbf7, #f5ebd9);
  background-size: 200% 200%;
  animation: gradientMove 10s ease infinite;
  font-family: 'Georgia', serif;
  color: #333;
}

@keyframes gradientMove {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* ===== STAGE BASE ===== */
.stage {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100vh;
  z-index: 1000;
  padding: 20px;
  box-sizing: border-box;
  justify-content: center;
  align-items: center;
  text-align: center;
  flex-direction: column;
}

.stage.active {
  display: flex;
}

/* Card */
.card {
  background: rgba(255, 255, 255, 0.95);
  backdrop-filter: blur(15px);
  border-radius: 20px;
  padding: 50px 30px;
  width: 450px;
  max-width: 90%;
  text-align: center;
  color: #444;
  position: relative;
  box-shadow: 0 15px 40px rgba(218, 165, 32, 0.3);
  animation: fadeUp 1s ease forwards, subtleGlow 4s infinite alternate;
  transform-style: preserve-3d;
  transition: transform 0.3s ease;
  border: 1px solid rgba(218, 165, 32, 0.5);
}

@keyframes subtleGlow {
  from { box-shadow: 0 15px 40px rgba(218, 165, 32, 0.3); }
  to { box-shadow: 0 20px 60px rgba(255, 215, 0, 0.2); }
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}

h2, h1 {
  font-size: 36px;
  margin-top: 0;
  margin-bottom: 10px;
  letter-spacing: 1.5px;
  font-weight: normal;
}

h2 b, h1 b {
  font-weight: bold;
  color: #b8860b;
}

/* ===== BUTTON ===== */
button {
  padding: 14px 35px;
  border: none;
  border-radius: 30px;
  margin-top: 25px;
  font-size: 15px;
  font-weight: bold;
  cursor: pointer;
  background: linear-gradient(90deg, #ffd700, #daa520);
  color: #fff;
  text-shadow: 0 1px 2px rgba(0,0,0,0.1);
  box-shadow: 0 10px 20px rgba(218, 165, 32, 0.4);
  transition: .3s ease;
  text-transform: uppercase;
  letter-spacing: 1px;
}

button:hover {
  transform: translateY(-3px);
  box-shadow: 0 15px 30px rgba(218, 165, 32, 0.6);
  background: linear-gradient(90deg, #ffdf00, #e6b800);
}

/* ===== ENVELOPE ===== */
.envelope {
  width: 260px;
  height: 180px;
  background: linear-gradient(135deg, #ffd700, #daa520);
  margin: 30px auto;
  position: relative;
  border-radius: 8px;
  box-shadow: 0 15px 30px rgba(218, 165, 32, 0.4);
  cursor: pointer;
  overflow: hidden;
  transition: transform .4s ease;
  border: 1px solid rgba(255,255,255,0.6);
}

.envelope:hover {
  transform: scale(1.05);
}

.flap {
  position: absolute;
  width: 100%;
  height: 100%;
  background: linear-gradient(135deg, #daa520, #ffd700);
  clip-path: polygon(0 0, 100% 0, 50% 60%);
  transition: .8s ease;
  transform-origin: top;
  z-index: 2;
}

.letter {
  position: absolute;
  bottom: -100%;
  left: 0;
  background: #fffafa;
  color: #b8860b;
  width: 100%;
  height: 100%;
  padding: 20px;
  box-sizing: border-box;
  transition: .8s ease;
  font-size: 16px;
  line-height: 1.6;
  border-radius: 8px;
  z-index: 1;
  font-weight: normal;
  font-style: italic;
  border: 1px solid rgba(218,165,32,0.3);
}

/* ===== LOVE METER ===== */
.loveLevelTag {
  display: inline-block;
  background: rgba(218, 165, 32, 0.15);
  color: #b8860b;
  font-weight: bold;
  padding: 8px 18px;
  border-radius: 30px;
  font-size: 13px;
  letter-spacing: 1px;
  margin: 10px 0;
  text-transform: uppercase;
}

.lovePulse {
  animation: pulseLove .3s ease;
}

@keyframes pulseLove {
  0% { transform: scale(1); }
  50% { transform: scale(1.15); }
  100% { transform: scale(1); }
}

.loveBar {
  width: 300px;
  height: 16px;
  background: rgba(0,0,0,0.05);
  border-radius: 20px;
  margin: 20px auto;
  position: relative;
  overflow: hidden;
  border: 1px solid rgba(218, 165, 32, 0.3);
}

#loveFill {
  height: 100%;
  width: 0%;
  min-width: 10px;
  background: linear-gradient(90deg, #ffd700, #b8860b);
  border-radius: 20px;
  transition: width .35s ease;
  box-shadow: 0 0 15px rgba(255, 215, 0, 0.6);
}

.loveBig {
  font-size: 60px;
  font-weight: bold;
  margin-top: 10px;
  color: #b8860b;
  text-shadow: 0 2px 5px rgba(0,0,0,0.1);
  transition: all .3s ease;
}

.loveSub {
  opacity: 0.8;
  margin-bottom: 20px;
  font-size: 15px;
}

/* Button Shake */
.shake {
  animation: shake .3s;
}

@keyframes shake {
  0%{transform:translateX(0)}
  25%{transform:translateX(-4px)}
  50%{transform:translateX(4px)}
  75%{transform:translateX(-4px)}
  100%{transform:translateX(0)}
}

/* Floating Hearts (Stars for Dark theme) */
.floatHeart {
  position: absolute;
  font-size: 20px;
  pointer-events: none;
  animation: heartFloat 1.2s forwards;
  color: #ffd700;
  text-shadow: 0 0 10px #b8860b;
}

@keyframes heartFloat {
  0% { opacity: 1; transform: translateY(0) scale(1) rotate(0deg); }
  100% { opacity: 0; transform: translateY(-120px) scale(1.5) rotate(45deg); }
}

#tvScreen img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  border-radius: 12px;
}

/* Progress Dots */
.progress-dots {
  position: fixed;
  bottom: 25px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 12px;
}

.dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: rgba(218, 165, 32, 0.3);
  transition: .3s ease;
}

.dot.active {
  background: #b8860b;
  box-shadow: 0 0 8px #b8860b;
}

.voice-container {
  display: flex;
  flex-direction: column;
  gap: 15px;
  margin-top: 25px;
  width: 80%;
  margin-inline: auto;
}

.voiceBtn {
  padding: 15px 25px;
  border-radius: 30px;
  border: 1px solid #ffd700;
  background: rgba(255, 255, 255, 0.8);
  color: #b8860b;
  font-weight: bold;
  cursor: pointer;
  font-size: 15px;
  transition: .3s;
}

.voiceBtn:hover {
  background: rgba(255, 215, 0, 0.2);
}

/* YES Button */
.yes {
  background: linear-gradient(90deg, #ffd700, #daa520);
  color: white;
  animation: subtleGlowBtn 2s infinite;
  font-weight: bold;
}

@keyframes subtleGlowBtn {
  0%{box-shadow:0 0 15px rgba(218,165,32,.3);}
  50%{box-shadow:0 0 30px rgba(218,165,32,.7);}
  100%{box-shadow:0 0 15px rgba(218,165,32,.3);}
}

.no {
  background: rgba(218, 165, 32, 0.1) !important;
  color: #886000 !important;
  border: 1px solid #daa520 !important;
}

.ring {
  font-size: 70px;
  opacity: 0;
  transition: .6s;
  margin: 20px 0;
}

.ring.show {
  opacity: 1;
  transform: scale(1.2);
}

</style>
</head>

<body>

<!-- STAGE 1 -->
<div class="stage active" id="stage1">
  <div class="card" style="padding-top:60px;">
    <h1>Happy <br><b>Anniversary</b> 🥂</h1>
    <div class="envelope" onclick="openLetter()">
      <div class="flap"></div>
      <div class="letter" id="letterContent">{{message}}</div>
    </div>
    <button onclick="nextStage()">Open Your Gift</button>
  </div>
</div>

<!-- STAGE 2 -->
<div class="stage" id="stage2">
  <div class="card">
    <h2>Do You <br><b>Still Love Me?</b></h2>
    <p style="opacity:.8; font-size:14px; margin-bottom:30px;">Tap repeatedly to prove it...</p>
    <div class="loveLevelTag" id="loveLevelTag">Awaiting Touch ✨</div>
    <div class="loveBar">
      <div id="loveFill"></div>
    </div>
    <div class="loveBig" id="loveBig">0%</div>
    <p class="loveSub" id="loveSub">...</p>
    <button class="loveBtn" onclick="increaseLove()" style="font-size:18px;">🥂 Tap Here</button>
    <button id="continueBtn" onclick="nextStage()" style="display:none">Continue →</button>
  </div>
</div>

<!-- STAGE 3 MEMORIES -->
<div class="stage" id="stage3">
  <div class="card">
    <h2>Our <br><b>Journey</b></h2>
    <div id="tvScreen" style="width:100%; height:200px; overflow:hidden; border-radius:12px; background:rgba(0,0,0,0.05); margin-top:20px; border:1px solid #ffd700;"></div>
    <div style="margin-top:25px; display:flex; gap:15px; justify-content:center;">
      <button onclick="prevMemory()" style="background:rgba(218, 165, 32, 0.2); border:1px solid #daa520; color:#b8860b;">⬅</button>
      <button onclick="nextMemory()" style="background:rgba(218, 165, 32, 0.2); border:1px solid #daa520; color:#b8860b;">➡</button>
    </div>
    <button onclick="nextStage()" style="width:100%; margin-top:15px;">Continue</button>
  </div>
</div>

<!-- STAGE 4 VOICE MEMORIES -->
<div class="stage" id="stage4">
  <div class="card">
    <h2>Listen <br><b>Closely</b> 🎧</h2>
    <p style="opacity:.8; font-size:14px;">A special message for you</p>
    <div id="voiceContainer" class="voice-container"></div>
    <button onclick="nextStage()" style="width:100%;">Continue</button>
  </div>
</div>

<!-- STAGE 6 FINAL -->
<div class="stage" id="stage6">
  <div class="card" style="padding:60px 40px;">
    <h2 id="finalQuestion" style="font-weight:normal;"></h2>
    <div class="ring" id="ring">🥂💛</div>
    <div style="display:flex; gap:15px; justify-content:center; margin-top:30px;">
      <button class="yes" id="yesBtn" onclick="celebrate()">YES</button>
      <button class="no" id="noBtn">NO</button>
    </div>
  </div>
</div>

<div class="progress-dots" id="progressDots"></div>

<script type="module">
import { initEpicInteractions } from "../js/stageEngine.js";

document.addEventListener("DOMContentLoaded",()=>{
  const saved = JSON.parse(localStorage.getItem("only4you_story")) || {};
  if (window.location.search.includes("preview")) return;

  initEpicInteractions({
    message:"Happy Anniversary! I love you so much 🥂💛",
    images: saved.images || [],
    voices: saved.voices || [],
    finalQuestion:"Will you spend forever with me? 💍"
  });
});
</script>

</body>
</html>
