<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I Miss You ☁️💙</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
/* AGGRESSIVE THEME OVERRIDES */
html, body, .main-wrapper {
  margin: 0 !important;
  padding: 0 !important;
  overflow: hidden !important;
  min-height: 100vh !important;
  display: flex !important;
  flex-direction: column !important;
  justify-content: center !important;
  align-items: center !important;
  background: linear-gradient(135deg, #e0f7fa, #ffffff, #b3e5fc) !important;
  background-size: 400% 400% !important;
  animation: skyMove 15s ease infinite !important;
  font-family: 'Poppins', sans-serif !important;
  color: #333 !important;
}

@keyframes skyMove {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* Floating Clouds */
.cloud {
  position: fixed;
  opacity: 0.6;
  pointer-events: none;
  animation: cloudFloat linear infinite;
  z-index: 1;
}

@keyframes cloudFloat {
  from { transform: translateX(-200px); }
  to { transform: translateX(calc(100vw + 200px)); }
}

/* ===== STAGE BASE ===== */
.stage {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100vh;
  z-index: 1000;
  padding: 20px;
  box-sizing: border-box;
  justify-content: center;
  align-items: center;
  text-align: center;
  flex-direction: column;
}

.stage.active {
  display: flex;
}

/* Card - Overriding engine shadows */
.card {
  background: rgba(255,255,255,0.73) !important;
  backdrop-filter: blur(25px) !important;
  border-radius: 40px !important;
  padding: 50px 30px !important;
  width: 450px !important;
  max-width: 90% !important;
  text-align: center !important;
  color: #2c3e50 !important;
  position: relative !important;
  box-shadow: 0 15px 35px rgba(179,229,252,0.6) !important;
  animation: fadeIn 1.2s ease forwards !important;
  transform-style: preserve-3d !important;
  border: 1px solid rgba(255,255,255,0.4) !important;
  z-index: 10 !important;
  display: flex !important;
  flex-direction: column !important;
  align-items: center !important;
}

@keyframes fadeIn {
  from { opacity: 0; transform: scale(0.9) translateY(20px); }
  to { opacity: 1; transform: scale(1) translateY(0); }
}

h2, h1 {
  font-family: 'Dancing Script', cursive !important;
  font-size: 48px !important;
  margin-top: 0 !important;
  margin-bottom: 20px !important;
  color: #0288d1 !important;
}

/* ===== ENGINE COMPATIBLE OVERRIDE (REMOVE RED/PINK) ===== */
.envelope {
  width: 220px !important;
  height: auto !important;
  min-height: 150px !important;
  margin: 10px auto !important;
  cursor: pointer !important;
  position: relative !important;
  background: transparent !important;
  box-shadow: none !important;
  display: flex !important;
  flex-direction: column !important;
  align-items: center !important;
}

.envelope::after {
  content: none !important;
  display: none !important;
}

.plane-svg {
  width: 130px;
  filter: drop-shadow(0 10px 15px rgba(0,0,0,0.1));
  animation: planeWobble 3s ease-in-out infinite;
  transition: opacity 0.4s ease;
  position: relative;
  z-index: 5;
}

.envelope.envelope-opened .plane-svg {
  opacity: 0;
  pointer-events: none;
  height: 0;
  margin-bottom: 0px;
}

.flap {
  display: none !important; 
}

@keyframes planeWobble {
  0%, 100% { transform: translateY(0) rotate(0deg); }
  50% { transform: translateY(-10px) rotate(5deg); }
}

/* LETTER - Corrected Alignment */
#letterContent {
  display: none;
  background: white !important;
  padding: 30px !important;
  border-radius: 20px !important;
  box-shadow: 0 10px 40px rgba(2,136,209,0.15) !important;
  font-family: 'Dancing Script', cursive !important;
  font-size: 24px !important;
  color: #01579b !important;
  line-height: 1.5 !important;
  width: 100% !important;
  box-sizing: border-box !important;
  margin-top: 10px !important;
  margin-bottom: 20px !important;
  animation: unfold 0.6s ease forwards !important;
}

.envelope.envelope-opened + #letterContent {
  display: block !important;
}

@keyframes unfold {
  from { opacity: 0; transform: translateY(20px) scaleY(0.8); }
  to { opacity: 1; transform: translateY(0) scaleY(1); }
}

/* ===== ENGINE COMPATIBLE LOVE METER ===== */
.meter-tag {
  display: inline-block;
  background: rgba(2,136,209,0.1);
  padding: 8px 18px;
  border-radius: 30px;
  font-size: 14px;
  font-weight: 600;
  margin: 10px 0;
  color: #0288d1;
}

.meter-bar {
  width: 100%;
  max-width: 300px;
  height: 18px;
  background: rgba(0,0,0,0.05);
  border-radius: 20px;
  margin: 20px auto;
  position: relative;
  overflow: hidden;
}

#loveFill {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, #26c6da, #0288d1) !important;
  border-radius: 20px;
  transition: width .4s ease;
}

/* Progress Dots Fix */
.dot.active {
  background: #0288d1 !important;
  box-shadow: 0 0 15px rgba(2,136,209,0.6) !important;
}

button:not(.quiz-opt) {
  padding: 14px 40px !important;
  border: none !important;
  border-radius: 40px !important;
  margin-top: 10px !important;
  font-size: 18px !important;
  font-weight: 600 !important;
  cursor: pointer !important;
  background: linear-gradient(90deg, #0288d1, #26c6da) !important;
  color: white !important;
  font-family: 'Poppins', sans-serif !important;
  box-shadow: 0 10px 30px rgba(2, 136, 209, 0.3) !important;
}

.quiz-opt.selected {
  background: #0288d1 !important;
  border: 2px solid #fff !important;
  box-shadow: 0 0 25px rgba(2, 136, 209, 0.8) !important;
  transform: scale(1.05);
}

#ring.show {
  opacity: 1 !important;
  transform: scale(1) !important;
}

</style>
</head>

<body>

<!-- STAGE 1: OPENER -->
<div class="stage active" id="stage1">
  <div class="card">
    <h2>A message for you... ☁️</h2>
    
    <div class="envelope" onclick="openLetter()">
      <div class="flap"></div> 
      <svg class="plane-svg" viewBox="0 0 512 512" fill="#0288d1">
        <path d="M512 64L0 256l192 64 64 192L512 64z"/>
        <path d="M192 320l256-192-256 128V320z" fill="#01579b"/>
      </svg>
      <div class="plane-label" style="font-size:12px; font-weight:700; color:#0288d1; opacity:0.7">TAP TO UNFOLD ✈️</div>
    </div>

    <!-- Letter Content OUTSIDE envelope for natural layout -->
    <div id="letterContent">
        <!-- Text typed by Engine -->
    </div>

    <button onclick="nextStage()" style="display:none">Start Journey ➡</button>
  </div>
</div>

<!-- STAGE 2: METER -->
<div class="stage" id="stage2">
  <div class="card">
    <h2>Missing You... 💙</h2>
    <div class="meter-tag" id="loveLevelTag">WARMING UP 🌬️</div>
    <div class="meter-bar">
      <div id="loveFill"></div>
    </div>
    <div id="loveBig" style="font-size:60px; font-weight:700; color:#0288d1;">0%</div>
    
    <button id="loveBtn" onclick="increaseLove()">🫂 Send Hugs</button>
    <button id="continueBtn" onclick="nextStage()" style="display:none">Continue ➡</button>
  </div>
</div>

<!-- STAGE 3: MEMORIES -->
<div class="stage" id="stage3">
  <div class="card">
    <h2>Sweet Memories ☁️</h2>
    <div id="tvScreen" style="width:100%; height:320px; overflow:hidden; border-radius:30px; margin-top:20px;"></div>
    <div style="margin-top:20px; display:flex; gap:12px; justify-content:center;">
      <button onclick="prevMemory()" style="background:#e1f5fe; color:#0288d1; padding:10px 25px !important;">⬅</button>
      <button onclick="nextMemory()" style="background:#e1f5fe; color:#0288d1; padding:10px 25px !important;">➡</button>
    </div>
    <button onclick="nextStage()" style="width:100%; margin-top:20px;">Continue 💙</button>
  </div>
</div>

<!-- STAGE 4: REACTION TARGET -->
<div class="stage" id="stage4">
  <div class="card">
    <h2>Hear My Heart 🎧</h2>
    <div id="voiceContainer" style="width:100%;"></div>
    
    <div id="reactionTarget" style="margin-top: 20px;"></div>

    <button onclick="nextStage()" style="width:100%; margin-top:20px;">Continue 💙</button>
  </div>
</div>

<!-- STAGE 5: QUIZ -->
<div class="stage" id="stage5">
  <div class="card">
    <h2>Our Story ☁️</h2>
    <div id="quizContainer" style="width:100%;"></div>
    <button onclick="nextStage()" style="width:100%;">Almost there 💍</button>
  </div>
</div>

<!-- STAGE 6: FINAL -->
<div class="stage" id="stage6">
  <div class="card">
    <h2 id="finalQuestion" style="font-size:40px;"></h2>
    <div id="ring" style="font-size:80px; margin:20px 0; opacity:0; transform:scale(0); transition: all 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);">🥹</div>
    <div style="display:flex; gap:15px; justify-content:center;">
      <button id="yesBtn" onclick="celebrate()" style="background:#0288d1 !important;">YES 💙</button>
      <button id="noBtn" style="background:#e3f2fd !important; color:#0288d1 !important; border:1px solid #0288d1 !important;">NO 😅</button>
    </div>
  </div>
</div>

<div id="progressDots"></div>

</body>
</html>
