<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Only4You Admin 👑</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#ffe6f2,#ffd6e8);
  padding:25px;
}
h1{text-align:center;}
.top{
  display:flex;
  justify-content:space-between;
  align-items:center;
}
button{
  padding:6px 15px;
  border:none;
  border-radius:20px;
  background:#ff4d6d;
  color:white;
  cursor:pointer;
}
.stat-box{
  background:white;
  padding:20px;
  border-radius:15px;
  min-width:180px;
  text-align:center;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
}
.stats{
  display:flex;
  gap:20px;
  flex-wrap:wrap;
  justify-content:center;
  margin:20px 0;
}
.card{
  background:white;
  padding:15px;
  border-radius:15px;
  margin:10px 0;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
}
input{
  padding:10px;
  border-radius:20px;
  border:1px solid #ccc;
  width:250px;
}
canvas{
  max-width:600px;
  margin:30px auto;
}
.section-title{
  margin-top:40px;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="top">
  <h1>👑 Only4You Admin</h1>
  <button id="logoutBtn">Logout</button>
</div>

<div class="stats">
  <div class="stat-box">
    <h3>Total Revenue 💰</h3>
    <p id="totalRevenue">₹0</p>
  </div>
  <div class="stat-box">
    <h3>Today Revenue 📅</h3>
    <p id="todayRevenue">₹0</p>
  </div>
  <div class="stat-box">
    <h3>This Month 📊</h3>
    <p id="monthRevenue">₹0</p>
  </div>
  <div class="stat-box">
    <h3>Total Surprises 🎁</h3>
    <p id="totalCount">0</p>
  </div>
</div>

<div style="text-align:center;">
  <input type="text" id="search" placeholder="Search by Receiver 🔎">
</div>

<canvas id="planChart"></canvas>

<div class="section-title">All Surprises</div>
<div id="list"></div>

<div class="section-title">Top 5 Most Viewed 👀</div>
<div id="topViews"></div>

<div class="section-title">Top 5 Most Loved ❤️</div>
<div id="topLoves"></div>

<div class="section-title">Expiring Soon ⏳</div>
<div id="expiringSoon"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getAuth,
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

import {
  getFirestore,
  collection,
  getDocs,
  doc,
  deleteDoc,
  updateDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBdp7U014kNZzYB4MD9Sqn7MuuCjLWcdxI",
  authDomain: "only4you-55c34.firebaseapp.com",
  projectId: "only4you-55c34",
  storageBucket: "only4you-55c34.appspot.com",
  messagingSenderId: "1051434083700",
  appId: "1:1051434083700:web:95d52d9fc79ccdba983821"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const ADMIN_UID = "Uwtpy28RdRXyOoKbU08485YmjIn2";

onAuthStateChanged(auth, async(user)=>{

if(!user || user.uid !== ADMIN_UID){
  document.body.innerHTML="<h2>Access Denied ❌</h2>";
  return;
}

document.getElementById("logoutBtn").onclick=()=>{
  localStorage.removeItem("_u4y_preview_lock");
  signOut(auth).then(()=>location.href="index.html");
};

const snapshot=await getDocs(collection(db,"surprises"));

let totalRevenue=0;
let todayRevenue=0;
let monthRevenue=0;
let totalCount=0;

let planCounts={"48":0,"89":0,"169":0,"299":0};

let allData=[];

const now=new Date();
const today=now.toDateString();
const month=now.getMonth();

snapshot.forEach(docSnap=>{
  const data=docSnap.data();
  data.id=docSnap.id;
  totalCount++;
  totalRevenue+=Number(data.plan||0);
  planCounts[data.plan]++;

  const created=new Date(data.createdAt||0);

  if(created.toDateString()===today)
    todayRevenue+=Number(data.plan||0);

  if(created.getMonth()===month)
    monthRevenue+=Number(data.plan||0);

  allData.push(data);
});

document.getElementById("totalRevenue").innerText="₹"+totalRevenue;
document.getElementById("todayRevenue").innerText="₹"+todayRevenue;
document.getElementById("monthRevenue").innerText="₹"+monthRevenue;
document.getElementById("totalCount").innerText=totalCount;

/* Render List */
const list=document.getElementById("list");
function render(filter=""){
  list.innerHTML="";
  allData
    .filter(d=>d.receiver.toLowerCase().includes(filter.toLowerCase()))
    .forEach(d=>{
      list.innerHTML+=`
      <div class="card">
        <strong>${d.receiver}</strong>
        <p>Plan: ₹${d.plan}</p>
        <p>Views: ${d.views||0}</p>
        <p>Loves: ${d.reactions||0}</p>
        <button onclick="deleteSurprise('${d.id}')">Delete</button>
        <button onclick="resetLoves('${d.id}')">Reset</button>
        <button onclick="extend('${d.id}')">Extend 7d</button>
      </div>`;
    });
}
render();

document.getElementById("search")
.addEventListener("input",(e)=>render(e.target.value));

/* Top Lists */
function renderTop(){
  const topViews=[...allData]
    .sort((a,b)=>(b.views||0)-(a.views||0))
    .slice(0,5);
  const topLoves=[...allData]
    .sort((a,b)=>(b.reactions||0)-(a.reactions||0))
    .slice(0,5);

  document.getElementById("topViews").innerHTML=
    topViews.map(d=>`<div class="card">${d.receiver} - ${d.views||0} views</div>`).join("");

  document.getElementById("topLoves").innerHTML=
    topLoves.map(d=>`<div class="card">${d.receiver} - ${d.reactions||0} loves</div>`).join("");
}
renderTop();

/* Expiring Soon */
const soon=allData.filter(d=>
  d.expiresAt && d.expiresAt < Date.now()+2*24*60*60*1000
);

document.getElementById("expiringSoon").innerHTML=
soon.map(d=>`<div class="card">${d.receiver} expiring soon</div>`).join("");

/* Chart */
new Chart(document.getElementById("planChart"),{
type:'bar',
data:{
labels:['48','89','169','299'],
datasets:[{
label:'Plan Purchases',
data:[
planCounts["48"],
planCounts["89"],
planCounts["169"],
planCounts["299"]
]
}]
}
});

});

/* Admin Controls */
window.deleteSurprise=async(id)=>{
  await deleteDoc(doc(db,"surprises",id));
  location.reload();
};
window.resetLoves=async(id)=>{
  await updateDoc(doc(db,"surprises",id),{reactions:0});
  location.reload();
};
window.extend=async(id)=>{
  await updateDoc(doc(db,"surprises",id),{
    expiresAt: Date.now()+7*24*60*60*1000
  });
  location.reload();
};

</script>
</body>
</html>
