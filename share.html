<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Share Your Surprise 💖 | Only4You</title>
<meta name="description" content="Share your romantic surprise with your loved one.">

<script src="https://cdn.jsdelivr.net/npm/qrious/dist/qrious.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.0/vanilla-tilt.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
  :root {
    --primary: #ff4d88;
    --secondary: #ff1f5a;
    --dark: #0f0f13;
    --card-bg: rgba(22, 12, 18, 0.78);
    --glass-border: rgba(255, 100, 150, 0.18);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    background: radial-gradient(ellipse at 20% 20%, #2a0a1f 0%, #0f0f13 60%);
    font-family: 'Inter', system-ui, sans-serif;
    color: #fff;
    padding: 2rem 1rem 4rem;
    overflow-x: hidden;
  }

  /* ── Orbs ── */
  .bg-orb {
    position: fixed; border-radius: 50%; filter: blur(90px);
    z-index: 0; pointer-events: none;
    animation: orbFloat 12s ease-in-out infinite;
  }
  .bg-orb-1 { width:350px;height:350px;background:rgba(255,77,136,0.12);top:-5%;left:-5%; }
  .bg-orb-2 { width:450px;height:450px;background:rgba(180,30,90,0.09);bottom:-10%;right:-5%;animation-delay:-6s; }
  @keyframes orbFloat {
    0%,100% { transform:translateY(0) scale(1); }
    50%      { transform:translateY(-25px) scale(1.06); }
  }

  /* ── Header ── */
  .page-header {
    position: relative; z-index:1; text-align: center; margin-bottom: 1.6rem;
  }
  .page-header .logo {
    font-size:1rem; font-weight:700; letter-spacing:2.5px; text-transform:uppercase;
    background:linear-gradient(90deg,#ff4d88,#ff85a1);
    -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;
    margin-bottom:0.35rem;
  }
  .page-header h1 { font-size:1.55rem; font-weight:700; line-height:1.2; }
  .page-header p  { font-size:0.88rem; color:rgba(255,255,255,0.55); margin-top:0.35rem; }

  /* ── Card ── */
  .card-wrap { perspective:1200px; position:relative; z-index:1; }

  .card {
    width: min(380px, 92vw);
    background: var(--card-bg);
    border-radius: 24px;
    padding: 20px;
    border: 1px solid var(--glass-border);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    box-shadow: 0 24px 60px rgba(0,0,0,0.55), inset 0 0 0 1px rgba(255,255,255,0.04);
    display: flex;
    flex-direction: column;
    align-items: center;
    transform-style: preserve-3d;
    position: relative;
    overflow: hidden;
  }

  /* shimmer */
  .shimmer {
    position:absolute; inset:0; border-radius:24px; pointer-events:none; z-index:2;
    background:linear-gradient(120deg,transparent 30%,rgba(255,255,255,0.11) 50%,transparent 70%);
    background-size:200% 100%;
    animation:shimmerAnim 4s linear infinite;
  }
  @keyframes shimmerAnim {
    0%   { background-position:200% 0; }
    100% { background-position:-200% 0; }
  }

  /* ── Heart QR display (full card visual) ── */
  .heart-qr-wrap {
    width: 100%;
    border-radius: 20px;
    overflow: hidden;
    transform: translateZ(30px);
    box-shadow: 0 0 40px rgba(255,50,100,0.35), 0 8px 30px rgba(0,0,0,0.6);
    position: relative;
    animation: heartGlow 3s ease-in-out infinite alternate;
  }
  @keyframes heartGlow {
    from { box-shadow: 0 0 30px rgba(255,50,100,0.3), 0 8px 30px rgba(0,0,0,0.6); }
    to   { box-shadow: 0 0 60px rgba(255,50,100,0.65), 0 8px 30px rgba(0,0,0,0.6); }
  }
  #heartQRCanvas {
    display: block;
    width: 100%;
    height: auto;
    border-radius: 20px;
  }

  /* ── Card titles ── */
  .card-title {
    margin:18px 0 4px; font-size:1.3rem; font-weight:700; color:#ff85a1;
    text-align:center; transform:translateZ(25px);
    text-shadow:0 2px 12px rgba(255,77,136,0.45);
  }
  .card-sub {
    font-size:0.87rem; font-weight:500; text-align:center; transform:translateZ(18px);
    margin-bottom:16px;
    background:linear-gradient(90deg,#ff85a1,#ffeaef);
    -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;
  }

  /* ── Reaction stats ── */
  .reaction-stats {
    display:none; align-items:center; gap:8px;
    background:rgba(255,77,136,0.1); border:1px solid rgba(255,77,136,0.25);
    padding:8px 18px; border-radius:20px; font-weight:600; color:#ff85a1;
    font-size:0.88rem; margin-bottom:14px; transform:translateZ(18px);
    animation:pulseGlow 2.5s infinite alternate;
  }
  @keyframes pulseGlow {
    from { box-shadow:0 0 8px rgba(255,77,136,0.2); }
    to   { box-shadow:0 0 20px rgba(255,77,136,0.5); }
  }

  /* ── Buttons ── */
  .actions {
    display:flex; flex-direction:column; gap:10px;
    width:100%; transform:translateZ(22px);
  }
  .btn {
    padding:13px 22px; border:none; border-radius:50px;
    font-size:13.5px; font-weight:600; cursor:pointer; color:white;
    display:flex; align-items:center; justify-content:center; gap:8px;
    transition:transform 0.25s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.25s ease;
    text-transform:uppercase; letter-spacing:0.8px;
    position:relative; overflow:hidden;
  }
  .btn::after {
    content:''; position:absolute; inset:0;
    background:rgba(255,255,255,0); transition:background 0.2s; border-radius:50px;
  }
  .btn:hover::after { background:rgba(255,255,255,0.08); }
  .btn:hover  { transform:translateY(-2px) scale(1.02); }
  .btn:active { transform:translateY(1px) scale(0.99); }

  .btn-copy {
    background:linear-gradient(135deg,#ff4d88,#ff1f5a);
    box-shadow:0 4px 16px rgba(255,31,90,0.4);
  }
  .btn-copy:hover { box-shadow:0 8px 28px rgba(255,31,90,0.6); }

  .btn-download {
    background:linear-gradient(135deg,#7b4fff,#4f46e5);
    box-shadow:0 4px 16px rgba(79,70,229,0.4);
  }
  .btn-download:hover { box-shadow:0 8px 28px rgba(79,70,229,0.6); }

  .share-row { display:flex; gap:10px; }
  .btn-share { flex:1; }

  .whatsapp {
    background:linear-gradient(135deg,#25D366,#128C7E);
    box-shadow:0 4px 16px rgba(37,211,102,0.3);
  }
  .whatsapp:hover { box-shadow:0 8px 28px rgba(37,211,102,0.5); }

  .instagram {
    background:linear-gradient(45deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888);
    box-shadow:0 4px 16px rgba(188,24,136,0.3);
  }
  .instagram:hover { box-shadow:0 8px 28px rgba(188,24,136,0.5); }

  /* ── Quiz results ── */
  .quiz-results {
    width:100%; margin-top:14px;
    background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08);
    border-radius:18px; padding:16px; display:none; flex-direction:column; gap:12px;
    transform:translateZ(18px);
  }
  .quiz-title {
    color:#ff85a1; font-size:1rem; font-weight:700; text-align:center;
    margin-bottom:6px; display:flex; align-items:center; justify-content:center; gap:6px;
  }
  .quiz-item {
    background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.06);
    padding:10px 14px; border-radius:12px;
  }
  .quiz-q { font-size:0.82rem; opacity:0.65; margin-bottom:3px; color:#fff; }
  .quiz-a { font-size:0.97rem; font-weight:600; color: var(--primary); }

  /* Reaction video */
  #reactionVideoBox {
    display:none; width:100%; margin-top:14px; transform:translateZ(22px);
  }
  #reactionVideoBox h3 { color:#ff85a1; font-size:1rem; margin-bottom:8px; }
  #reactionPlayer {
    width:100%; border-radius:14px;
    border:2px solid rgba(255,255,255,0.15);
    box-shadow:0 8px 20px rgba(0,0,0,0.5);
  }

  /* ── Toast ── */
  #toast {
    position:fixed; bottom:-100px; left:50%; transform:translateX(-50%);
    background:rgba(20,10,15,0.92); backdrop-filter:blur(12px);
    border:1px solid rgba(255,77,136,0.3); color:white;
    padding:11px 22px; border-radius:50px; font-size:0.88rem; font-weight:500;
    transition:bottom 0.4s cubic-bezier(0.34,1.56,0.64,1);
    z-index:9999; box-shadow:0 8px 30px rgba(0,0,0,0.4); white-space:nowrap;
  }
  #toast.show { bottom:28px; }

  /* ── Loader ── */
  #loadingOverlay {
    position:fixed; inset:0; background:#0f0f13;
    display:flex; align-items:center; justify-content:center;
    z-index:9000; transition:opacity 0.5s ease;
  }
  #loadingOverlay.hidden { opacity:0; pointer-events:none; }
  .loader-heart { font-size:3rem; animation:heartbeat 0.8s ease-in-out infinite; }
  @keyframes heartbeat {
    0%,100% { transform:scale(1); }
    50%      { transform:scale(1.22); }
  }
</style>
</head>

<div id="toast">Copied!</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import Optimization from "./js/optimization.js";

const firebaseConfig = {
  apiKey: "AIzaSyBdp7U014kNZzYB4MD9Sqn7MuuCjLWcdxI",
  authDomain: "only4you-55c34.firebaseapp.com",
  projectId: "only4you-55c34",
  storageBucket: "only4you-55c34.appspot.com",
  messagingSenderId: "1051434083700",
  appId: "1:1051434083700:web:95d52d9fc79ccdba983821"
};

const fbApp = initializeApp(firebaseConfig);
const db = getFirestore(fbApp);

// ── Toast helper ──────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 3000);
}

function hideLoader() {
  const o = document.getElementById('loadingOverlay');
  o.classList.add('hidden');
  setTimeout(() => o.remove(), 600);
}

// ── Links ─────────────────────────────────────────────────
const params = new URLSearchParams(window.location.search);
const id = params.get("id");

const frontendBase = window.location.origin;
// ✅ QR points directly to frontend — zero Render cold-start delay
const directLink = id
  ? `${frontendBase}/success.html?id=${id}`
  : `${frontendBase}/success.html`;

// WhatsApp still uses Render for OG meta preview cards
const ogShareLink = id
  ? `https://only4you-backend.onrender.com/s/${id}?origin=${encodeURIComponent(frontendBase)}`
  : directLink;

// ── Generate Heart QR ─────────────────────────────────────
function drawHeartQR(canvasId, link, size, isHighRes = false) {
  const canvas = document.getElementById(canvasId) || document.createElement("canvas");
  if (isHighRes) {
    canvas.width = size;
    canvas.height = size;
  }
  const ctx = canvas.getContext("2d");
  const s = size / 100; // scale factor
  const cx = size / 2;
  const cy = size / 2;

  // 1. Clear & Background
  ctx.clearRect(0, 0, size, size);

  // 2. Draw Heart Shape
  ctx.save();
  ctx.beginPath();
  drawHeartPath(ctx, 0, 0, size);
  ctx.closePath();
  
  // Heart Fill (Glowy Pink)
  const grad = ctx.createRadialGradient(cx, cy - 10 * s, 0, cx, cy - 10 * s, 50 * s);
  grad.addColorStop(0, "#ff4d88");
  grad.addColorStop(1, "#ff1f5a");
  ctx.fillStyle = grad;
  
  ctx.shadowColor = "rgba(255, 31, 90, 0.8)";
  ctx.shadowBlur = 20 * (size / 300);
  ctx.fill();
  ctx.restore();

  // 3. Generate QR code on offscreen canvas
  const qrSize = Math.round(size * 0.48); // Slightly smaller for better heart fitting
  const qrOff = document.createElement("canvas");
  new QRious({
    element: qrOff,
    value: link,
    size: qrSize,
    foreground: "#ff1f5a",
    background: "#ffffff",
    level: "H"
  });

  // 4. Draw QR (centered on heart)
  const qrX = cx - qrSize / 2;
  const qrY = cy - qrSize / 2 + 8 * s; // Lowered significantly to land in the "meaty" part of the heart

  // White rounded background for QR
  ctx.save();
  const pad = Math.round(6 * (size / 300));
  ctx.fillStyle = "#ffffff";
  const roundedQrX = Math.round(qrX);
  const roundedQrY = Math.round(qrY);
  const roundedQrSize = Math.round(qrSize);
  roundRect(ctx, roundedQrX - pad, roundedQrY - pad, roundedQrSize + pad * 2, roundedQrSize + pad * 2, Math.round(10 * (size / 300)));
  ctx.fill();

  // Draw the QR
  ctx.imageSmoothingEnabled = false; // Prevents blur
  ctx.drawImage(qrOff, roundedQrX, roundedQrY, roundedQrSize, roundedQrSize);
  ctx.imageSmoothingEnabled = true; // Restore for everything else
  ctx.restore();

  return canvas;
}

// Initialize the main heart QR
function initMainQR() {
  const canvas = document.getElementById("heartQRCanvas");
  // Set internal resolution for crispness
  canvas.width = 600;
  canvas.height = 600;
  drawHeartQR("heartQRCanvas", directLink, 600);
}

initMainQR();

// ── Firebase realtime ─────────────────────────────────────
if (id) {
  const ref = doc(db, "surprises", id);
  onSnapshot(ref, (snap) => {
    if (!snap.exists()) return;
    const data = snap.data();
    const template = data.template || "valentine";
    const root = document.documentElement;

    // Theme Detection
    if (template === "missyou") {
      root.style.setProperty("--primary", "#0288d1");
      root.style.setProperty("--secondary", "#26c6da");
      root.style.setProperty("--card-bg", "rgba(10, 20, 30, 0.78)");
      root.style.setProperty("--glass-border", "rgba(2,136,209,0.18)");
    } else {
      root.style.setProperty("--primary", "#ff4d88");
      root.style.setProperty("--secondary", "#ff1f5a");
      root.style.setProperty("--card-bg", "rgba(22, 12, 18, 0.78)");
      root.style.setProperty("--glass-border", "rgba(255, 100, 150, 0.18)");
    }

    document.getElementById("reactionCount").textContent = data.reactions || 0;
    document.getElementById("reactionStats").style.display = "flex";

    if (data.reaction) {
      document.getElementById("reactionPlayer").src = data.reaction;
      document.getElementById("reactionVideoBox").style.display = "block";
    }

    if (data.quiz && data.quiz.length > 0) {
      const sec = document.getElementById("quizResults");
      const box = document.getElementById("quizItems");
      sec.style.display = "flex";
      box.innerHTML = "";
      data.quiz.forEach((q, i) => {
        const ans = data.quizAnswers ? data.quizAnswers[i] : null;
        const el = document.createElement("div");
        el.className = "quiz-item";
        el.innerHTML = `
          <div class="quiz-q">${q.question}</div>
          <div class="quiz-a">${ans || '<span style="opacity:0.5;font-weight:normal;font-size:0.8rem">Waiting... ⏳</span>'}</div>`;
        box.appendChild(el);
      });
    }
  });
}

// ── Vanilla Tilt ──────────────────────────────────────────
if (!Optimization.isLowEnd) {
  VanillaTilt.init(document.getElementById("tiltCard"), {
    max: 10, speed: 400, glare: false, perspective: 1200
  });
}

hideLoader();



// ── Build composite shareable image ──────────────────────
// Generates the large high-res Heart QR image
async function buildShareCanvas() {
  const size = 1200; // High res for sharing
  const canvas = document.createElement("canvas");
  canvas.width = size;
  canvas.height = size;
  const ctx = canvas.getContext("2d");
  
  // 1. Background gradient matching the app
  const bgGrad = ctx.createRadialGradient(size/2, size/2, 0, size/2, size/2, size*0.8);
  bgGrad.addColorStop(0, "#2a0a1f");
  bgGrad.addColorStop(1, "#0f0f13");
  ctx.fillStyle = bgGrad;
  ctx.fillRect(0, 0, size, size);

  // 2. Draw the heart QR on this canvas
  const s = size / 100;
  const cx = size / 2;
  const cy = size / 2;

  ctx.save();
  ctx.beginPath();
  drawHeartPath(ctx, 0, 0, size); // Draw heart filling the canvas
  ctx.fillStyle = "#ff1f5a";
  ctx.shadowColor = "rgba(255, 31, 90, 0.8)";
  ctx.shadowBlur = 40;
  ctx.fill();
  ctx.restore();

  // 3. QR code
  const qrSize = Math.round(size * 0.45); // Proportionally smaller for a cleaner look
  const qrOff = document.createElement("canvas");
  new QRious({ element: qrOff, value: directLink, size: qrSize, foreground: "#ff1f5a", background: "#ffffff", level: "H" });

  const qrX = Math.round(cx - qrSize / 2);
  const qrY = Math.round(cy - qrSize / 2 + 8 * s);
  
  ctx.save();
  const pad = 15;
  ctx.fillStyle = "#ffffff";
  const roundedQrSize = Math.round(qrSize);
  roundRect(ctx, qrX - pad, qrY - pad, roundedQrSize + pad * 2, roundedQrSize + pad * 2, 20);
  ctx.fill();
  ctx.imageSmoothingEnabled = false; // Sharp edge
  ctx.drawImage(qrOff, qrX, qrY, roundedQrSize, roundedQrSize);
  ctx.imageSmoothingEnabled = true;
  ctx.restore();

  // 4. Branding text
  ctx.font = "bold 40px Inter, sans-serif";
  ctx.fillStyle = "rgba(255, 255, 255, 0.6)";
  ctx.textAlign = "center";
  ctx.fillText("ONLY4YOU.IN", size / 2, size - 80);

  return canvas;
}

// Heart path (fits in a bounding box starting at x,y with given size)
function drawHeartPath(ctx, x, y, size) {
  const cx = x + size / 2;
  const cy = y + size / 2;
  const s = size / 200; // scale factor based on 200 units original scale

  // Move to the top center dip
  ctx.moveTo(cx, cy - 40 * s);
  
  // Top left curve
  ctx.bezierCurveTo(cx, cy - 46 * s, cx - 10 * s, cy - 70 * s, cx - 50 * s, cy - 70 * s);
  
  // Bottom left curve
  ctx.bezierCurveTo(cx - 110 * s, cy - 70 * s, cx - 110 * s, cy + 5 * s, cx - 110 * s, cy + 5 * s);
  
  // Tip left curve
  ctx.bezierCurveTo(cx - 110 * s, cy + 40 * s, cx - 70 * s, cy + 84 * s, cx, cy + 120 * s);
  
  // Tip right curve
  ctx.bezierCurveTo(cx + 70 * s, cy + 84 * s, cx + 110 * s, cy + 40 * s, cx + 110 * s, cy + 5 * s);
  
  // Bottom right curve
  ctx.bezierCurveTo(cx + 110 * s, cy + 5 * s, cx + 110 * s, cy - 70 * s, cx + 50 * s, cy - 70 * s);
  
  // Top right curve
  ctx.bezierCurveTo(cx + 10 * s, cy - 70 * s, cx, cy - 46 * s, cx, cy - 40 * s);
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

async function getBlob() {
  const c = await buildShareCanvas();
  return new Promise(res => c.toBlob(res, "image/png", 1.0));
}

// ── Copy Image ───────────────────────────────────────────
document.getElementById("copyQR").onclick = async () => {
  showToast("Generating image... ⏳");
  try {
    const blob = await getBlob();
    await navigator.clipboard.write([new ClipboardItem({ "image/png": blob })]);
    showToast("Image copied! Paste anywhere 💖");
  } catch {
    const c = await buildShareCanvas();
    const a = document.createElement("a");
    a.download = "only4you-surprise.png";
    a.href = c.toDataURL("image/png", 1.0);
    a.click();
    showToast("Saved as image ⬇️");
  }
};

// ── Download ─────────────────────────────────────────────
document.getElementById("downloadBtn").onclick = async () => {
  showToast("Preparing... ⏳");
  try {
    const c = await buildShareCanvas();
    const a = document.createElement("a");
    a.download = "only4you-surprise.png";
    a.href = c.toDataURL("image/png", 1.0);
    a.click();
    showToast("Downloaded! 🎁");
  } catch(err) {
    console.error(err);
    showToast("Failed ❌");
  }
};

// ── WhatsApp ─────────────────────────────────────────────
document.getElementById("waShare").onclick = async () => {
  try {
    showToast("Copying image... ⏳");
    try {
      const blob = await getBlob();
      await navigator.clipboard.write([new ClipboardItem({ "image/png": blob })]);
    } catch(e) { /* proceed even if clipboard fails */ }
    const msg = `💖 I made something special for you!\nOpen it here 👉 ${ogShareLink}`;
    window.open("https://wa.me/?text=" + encodeURIComponent(msg));
    showToast("Image copied — paste in WhatsApp! ✨");
  } catch(err) {
    console.error(err);
    showToast("Something went wrong ❌");
  }
};

// ── Instagram / Native Share ─────────────────────────────
document.getElementById("igShare").onclick = async () => {
  if (navigator.share) {
    try {
      const blob = await getBlob();
      const file = new File([blob], "only4you-surprise.png", { type: "image/png" });
      if (navigator.canShare && navigator.canShare({ files: [file] })) {
        await navigator.share({ files: [file], title: "A Special Surprise 💖", text: `Open here: ${directLink}` });
        showToast("Shared! 🎉");
        return;
      }
    } catch(e) { /* fallback */ }
    try {
      await navigator.share({ title: "A Special Surprise 💖", url: directLink });
      showToast("Shared! 🎉");
    } catch(e) {}
  } else {
    try {
      await navigator.clipboard.writeText(directLink);
      showToast("Link copied! Paste on Instagram 📋");
    } catch {
      window.open(directLink);
    }
  }
};
