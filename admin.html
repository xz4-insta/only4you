<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Login 🔐</title>
<style>
body{
  margin:0;
  font-family:Arial;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#ff9acb,#ff4d88);
}
.box{
  background:white;
  padding:40px;
  border-radius:20px;
  text-align:center;
  width:320px;
  box-shadow:0 15px 40px rgba(0,0,0,0.3);
}
input{
  width:90%;
  padding:12px;
  margin:10px 0;
  border-radius:20px;
  border:1px solid #ddd;
}
button{
  padding:12px 25px;
  border:none;
  border-radius:25px;
  background:#ff4d6d;
  color:white;
  cursor:pointer;
}
</style>
</head>
<body>

<div class="box">
  <h2>Admin Login 🔐</h2>
  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password">
  <button onclick="login()">Login</button>
  <p id="msg"></p>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { 
  getAuth, 
  signInWithEmailAndPassword 
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBdp7U014kNZzYB4MD9Sqn7MuuCjLWcdxI",
  authDomain: "only4you-55c34.firebaseapp.com",
  projectId: "only4you-55c34",
  storageBucket: "only4you-55c34.appspot.com",
  messagingSenderId: "1051434083700",
  appId: "1:1051434083700:web:95d52d9fc79ccdba983821"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

const ADMIN_UID = "Uwtpy28RdRXyOoKbU08485YmjIn2";

window.login = async function(){

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  try {

    const cred = await signInWithEmailAndPassword(auth,email,password);

    if (cred.user.uid === ADMIN_UID) {
      window.location.href = "dashboard.html";
    } else {
      document.getElementById("msg").innerText = "Not authorized ❌";
    }

  } catch(err) {
    document.getElementById("msg").innerText = "Login failed ❌";
  }

}

</script>
</body>
</html>
